# Guardrail config for interview-prep-kit — sourced by the hooks in .agent/hooks/.
# Plain POSIX-shell assignments. Safe to edit by hand.

# Branches the agent must not commit/push to directly.
# EMPTY by design: this is a solo, trunk-based prep repo — committing to main is normal.
# Set e.g. PROTECTED_BRANCHES="main" if you start using PR-based contribution.
PROTECTED_BRANCHES=""

# Command the test-gate runs on Stop. Our "tests" are the well-formedness checks.
TEST_CMD="sh tests/validate.sh"

# Optional formatter (none for a docs/markdown plugin).
FORMAT_CMD=""

# Where the capture-learnings memory loop persists "mastered / weak spots / spaced repetition".
# (Hooks default to .agent/memory; override here if you keep progress in your workspace.)
# SCAFFOLD_MEMORY_DIR=".agent/memory"
