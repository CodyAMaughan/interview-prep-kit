name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate agent-first + plugin layer
        run: sh tests/validate.sh

      - name: Check JSON manifests are valid
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

      - name: Assert skill mirror parity
        run: diff -r .agents/skills .claude/skills

      - name: Guard against leaked personal-prep files
        run: |
          # No committed resumes/PDFs/DOCX anywhere in the tree.
          if git ls-files | grep -iE '\.(pdf|docx)$|(^|/)resume|(^|/)cover-letter'; then
            echo "Personal prep file committed — remove it."; exit 1
          fi
